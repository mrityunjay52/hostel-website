<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostel Management</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}
header {
  background: url('https://images.unsplash.com/photo-1505691938895-1758d7feb511') no-repeat center/cover;
  height: 60vh;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  font-weight: bold;
}
nav {
  background: #333;
  padding: 10px;
  text-align: center;
}
nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
}
section {
  padding: 20px;
}
.card {
  background: #f4f4f4;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
}
input, textarea, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}
button {
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}
iframe {
  width: 100%;
  height: 300px;
  border: none;
}
</style>
</head>
<body>

<header>
  Welcome to Hostel Portal
</header>

<nav>
  <a href="#fees">Fees</a>
  <a href="#leave">Leave</a>
  <a href="#login">Login</a>
  <a href="#location">Location</a>
</nav>

<section id="fees">
  <h2>Hostel Fee Details</h2>
  <div class="card">
    <p>Room Rent: ₹50,000/year</p>
    <p>Mess Charges: ₹30,000/year</p>
    <p>Security Deposit: ₹10,000</p>
  </div>
</section>

<section id="leave">
  <h2>Leave Application Form</h2>
  <div class="card">
    <form id="leaveForm">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="date" id="from" required>
      <input type="date" id="to" required>
      <textarea id="reason" placeholder="Reason" required></textarea>
      <button type="submit">Apply</button>
    </form>
  </div>
</section>

<section id="login">
  <h2>Login</h2>
  <div class="card">
    <form onsubmit="return login()">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
</section>

<section id="location">
  <h2>Hostel Location</h2>
  <iframe src="https://www.google.com/maps?q=hostel&output=embed"></iframe>
</section>

<script>
document.getElementById("leaveForm").addEventListener("submit", function(e) {
  e.preventDefault();
  alert("Leave application submitted successfully!");
});

function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234") {
    alert("Login Successful");
    return false;
  } else {
    alert("Invalid Credentials");
    return false;
  }
}
</script>

</body>
</html>
